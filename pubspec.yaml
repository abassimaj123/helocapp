name: heloc_app
description: HELOC Calculator
publish_to: 'none'
version: 1.0.11+16

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  calcwise_core:
    path: ../packages/calcwise_core
  flutter:
    sdk: flutter

  intl: ^0.20.0
  fl_chart: ^0.68.0
  google_mobile_ads: ^5.1.0
  shared_preferences: ^2.2.3
  in_app_purchase: ^3.2.0
  sqflite: ^2.3.3
  path: ^1.9.0
  pdf: ^3.11.1
  printing: ^5.13.1
  collection: ^1.18.0
  firebase_core: ^3.6.0
  firebase_analytics: ^11.3.3
  firebase_crashlytics: ^4.1.3
  in_app_review: ^2.0.9
  url_launcher: ^6.3.0
  share_plus: ^10.0.0
  path_provider: ^2.1.4
  flutter_native_splash: ^2.4.3

dev_dependencies:
  calcwise_lint:
    git:
      url: https://github.com/abassimaj123/calcwise_core.git
      path: calcwise_lint
      ref: main
  custom_lint: ">=0.6.0 <0.8.0"
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/branding/

flutter_launcher_icons:
  android: true
  ios: true
  image_path_android: "assets/images/icon_main.png"
  image_path_ios: "assets/images/icon_main.png"
  adaptive_icon_background: "#0C9C9F"
  adaptive_icon_foreground: "assets/images/icon_fg.png"
  remove_alpha_ios: true
  min_sdk_android: 21
  web:
    generate: false
  windows:
    generate: false



